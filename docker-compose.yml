services:
  db:
    image: postgres:16
    # No hardcoded container_name here: Compose derives container names from the project
    # name (COMPOSE_PROJECT_NAME, or the containing directory's basename by default), so a
    # second checkout in a different directory — e.g. a `git worktree` used for parallel
    # branch work — gets its own uniquely-named container instead of colliding with this
    # one. Override the project name explicitly with `docker compose -p <name> ...` or the
    # COMPOSE_PROJECT_NAME env var if you want a specific name.
    restart: unless-stopped
    environment:
      POSTGRES_DB: leaveapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Dev/build/test container: the whole .NET SDK toolchain, used for `dotnet build`,
  # `dotnet test`, `dotnet ef migrations`, and running the app locally — so nothing needs
  # to be installed on the host. See README for usage.
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    working_dir: /src
    volumes:
      - .:/src
      - nuget-cache:/root/.nuget/packages
      - ./.certs:/https:ro
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://+:8081;http://+:8080
      ASPNETCORE_Kestrel__Certificates__Default__Password: devcertpass
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=leaveapp;Username=postgres;Password=postgres
      # Separate database for `dotnet test` (the test fixture drops/recreates it) so tests never touch dev data.
      ConnectionStrings__TestConnection: Host=db;Port=5432;Database=leaveapp_test;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
      - "8081:8081"
    command: ["dotnet", "run", "--project", "src/LeaveAutopilot.Web", "--no-launch-profile"]
    healthcheck:
      # No curl in the SDK base image; a bash /dev/tcp probe needs nothing extra installed.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  # Playwright browser-based E2E tests (S3-4). Runs against the `app` + `db` services
  # above (started separately, e.g. `docker compose up -d --wait db app`) rather than
  # starting its own server. See README for usage.
  #
  # The image tag's Playwright version must match e2e/package.json's @playwright/test
  # version exactly — this image ships browsers pre-installed for that exact release, so
  # there's no separate `playwright install` step (and no risk of a client/browser
  # version-drift failure if npm ever resolved a newer @playwright/test).
  playwright:
    image: mcr.microsoft.com/playwright:v1.48.0-jammy
    working_dir: /e2e
    volumes:
      - ./e2e:/e2e
      # Named volume for node_modules (not bind-mounted from the host) so installed
      # binaries always match the container's architecture, and local `npm install`
      # runs don't leave Linux-specific artifacts on the host filesystem.
      - playwright-node-modules:/e2e/node_modules
      - playwright-report:/e2e/playwright-report
    depends_on:
      app:
        condition: service_healthy
    environment:
      BASE_URL: http://app:8080
    command: ["bash", "-c", "npm install && npx playwright test"]

volumes:
  pgdata:
  nuget-cache:
  playwright-node-modules:
  playwright-report:
