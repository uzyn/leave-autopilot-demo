name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: leaveapp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Tests connect directly to the service container on localhost (the job runs on the
      # runner, not inside a container, so "localhost" — not a compose service name — is correct here).
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=leaveapp_test;Username=postgres;Password=postgres
      ConnectionStrings__TestConnection: Host=localhost;Port=5432;Database=leaveapp_test;Username=postgres;Password=postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore LeaveAutopilot.sln

      - name: Build
        run: dotnet build LeaveAutopilot.sln --no-restore --configuration Release

      - name: Verify formatting
        run: dotnet format LeaveAutopilot.sln --verify-no-changes --no-restore

      - name: Test
        run: dotnet test LeaveAutopilot.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate local HTTPS dev certificate
        run: ./scripts/generate-dev-cert.sh

      - name: Build and start app + Postgres (docker compose)
        run: docker compose up -d --build --wait db app

      - name: Run Playwright suite (headless, in Docker)
        run: docker compose run --rm playwright bash -c "npm ci && npx playwright test"

      - name: Show app logs on failure
        if: failure()
        run: docker compose logs app

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore

      - name: Tear down docker compose stack
        if: always()
        run: docker compose down -v
